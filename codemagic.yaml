workflows:
  ios-test-build:
    name: Huka iOS (build de prueba, sin firmar)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build iOS (sin firmar)
        # flutter build genera el Podfile y corre pod install solo.
        # Sin GEMINI_API_KEY el build compila igual; el chat no responderá.
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
